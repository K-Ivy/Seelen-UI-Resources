                  items:
                    - syntax: <string>
                      name: '--toolbar-basel-bshadow'
                      label: "● Control"
                      tip: "X-pos, Y-Pos, Blur, Spread Radius"
                      initialValue: '0px 0px 0px 0px'

                    - syntax: <string>
                      name: '--toolbar-basel-bshadow-hovered'
                      label: "╰・Control on Hover"
                      tip: "v1.0 Default: 0px 0px 6px 3px"
                      initialValue: '0px 0px 0px 0px'

                    - syntax: <color>
                      name: '--toolbar-basel-bshadow-color'
