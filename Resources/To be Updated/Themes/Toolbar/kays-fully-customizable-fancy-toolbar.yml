      /* -- */
      border-top: var(--leftg-border-thickness, 2px) var(--leftg-topborder-style, solid) var(--leftg-top-border-color, #00000000);
      border-bottom: var(--leftg-border-thickness, 2px) var(--leftg-bottomborder-style, solid) var(--leftg-bottom-border-color, #00000000);
      border-right: var(--leftg-border-thickness, 2px) var(--leftg-rightborder-style, solid) var(--leftg-right-border-color, #00000000);
      border-left: var(--leftg-border-thickness, 2px) var(--leftg-leftborder-style, solid) var(--leftg-left-border-color, #00000000);
