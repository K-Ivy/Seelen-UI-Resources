    .ft-bar-item {
      .workspaces {
        gap: var(--dotted-elem-sep, 11px);
        .workspace-dot {
          width: var(--dotted-elem-inactive-width, 6px);
          height: var(--dotted-elem-inactive-height, 6px);
          background-color: var(--dotted-elem-inactive-color, #8f9396);
          border-radius: var(--dotted-elem-inactive-rounding, 3px);
          transition:
            border-radius var(--dotted-elem-rounding-transition, 0.4s ease),
            background-color var(--dotted-elem-color-transition, 0.4s ease),
            width var(--dotted-elem-width-transition, 0.4s ease),
            height var(--dotted-elem-height-transition, 0.4s ease) !important;
          &:hover,
          &:active {
            filter: none !important;
            width: var(--dotted-elem-inactive-width-state, 6px);
            height: var(--dotted-elem-inactive-height-state, 6px);
            background-color: var(--dotted-elem-inactive-color-state, #a6aaac);
            border-radius: var(--dotted-elem-inactive-rounding-state, 3px);
          }
          &.workspace-dot-active {
            width: var(--dotted-elem-active-width, 18px);
            height: var(--dotted-elem-active-height, 6px);
            background-color: var(--dotted-elem-active-color, #bcc0c2);
            border-radius: var(--dotted-elem-active-rounding, 3px);
            &:hover,
            &:active {
              width: var(--dotted-elem-active-width-state, 18px);
              height: var(--dotted-elem-active-height-state, 6px);
              background-color: var(--dotted-elem-active-color-state, #e4e2e2);
              border-radius: var(--dotted-elem-active-rounding-state, 3px);
            }
          }
        }
      }
