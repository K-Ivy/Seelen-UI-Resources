                      initialValue: '0.4s ease'

  - group:
      header: "✦ Left Group of the Toolbar"
      items:
        - syntax: <length>
          name: '--leftg-horizontal-pos'
          label: "╰ Side Extension"
          tip: "The default value extends the group’s left side to align with the base layer."
          initialValue: -14
          initialValueUnit: 'px'

        - group:
            header: " Position"
            items:
              - syntax: <length>
                name: '--leftg-vertical-pos'
                label: "● Vertical"
                initialValue: 0
                initialValueUnit: 'px'

        - group:
            header: " Padding"
            items:
              - syntax: <length>
                name: '--leftg-top-padding'
                label: "● Top"
                initialValue: 3
                initialValueUnit: 'px'

              - syntax: <length>
                name: '--leftg-bottom-padding'
                label: "● Bottom"
                initialValue: 3
                initialValueUnit: 'px'

              - syntax: <length>
                name: '--leftg-left-padding'
                label: "● Left"
                initialValue: 3
                initialValueUnit: 'px'

              - syntax: <length>
                name: '--leftg-right-padding'
                label: "● Right"
                initialValue: 3
                initialValueUnit: 'px'

        - group:
            header: " Background"
            items:
              - syntax: <color>
                name: '--leftg-background-color'
                label: "● Color"
                initialValue: '#00000000'

              - syntax: <color>
                name: '--leftg-background-color-hover'
                label: "╰・Color on Hover"
                initialValue: '#00000000'

              - syntax: <string>
