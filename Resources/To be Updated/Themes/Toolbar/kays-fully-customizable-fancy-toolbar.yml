      border-bottom-left-radius: var(--centerg-bottom-left-border-radius, 13px);
      border-top-right-radius: var(--centerg-top-right-border-radius, 13px);
      border-bottom-right-radius: var(--centerg-bottom-right-border-radius, 13px);
      /* -- */
      box-shadow: var(--centerg-outer-box-shadow, 0px 0px 0px 0px) var(--centerg-box-shadow-color, #00000000);
      /* -- */
      background-color: var(--centerg-background-color, #00000000);
      /* -- */
      transition:
        box-shadow var(--centerg-hover-transition-box-shadow, 0.4s ease),
        border-radius var(--centerg-hover-transition-border-radius, 0.4s ease),
        border-color var(--centerg-hover-transition-border, 0.4s ease),
        background-color var(--centerg-hover-transition-bg-color, 0.4s ease);
      /* Background image - Base */
      &::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 1;
        z-index: 0;
        pointer-events: none;
        /* Comprimise as "overflow: hidden" cannot be used here (modules half go into the edges as spacing is gone). Subtract 2px is needed as the image leaves slight empty gaps on the edges with the same value. Max ensures the subtract never go below zero. Properly better way exists. */
        border-top-left-radius: max(calc(var(--centerg-top-left-border-radius, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        border-top-right-radius: max(calc(var(--centerg-top-right-border-radius, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        border-bottom-right-radius: max(calc(var(--centerg-bottom-right-border-radius, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        border-bottom-left-radius: max(calc(var(--centerg-bottom-left-border-radius, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        /* -- */
        background-position: 100% var(--centerg-image-pos, 50%);
        background-size: cover;
        background-image: var(--centerg-bg-image, none);
