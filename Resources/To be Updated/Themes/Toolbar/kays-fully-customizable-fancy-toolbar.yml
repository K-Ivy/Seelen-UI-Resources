      /* -- */
      box-shadow: var(--leftg-outer-box-shadow, 0px 0px 0px 0px) var(--leftg-box-shadow-color, #00000000);
      /* -- */
      background-color: var(--leftg-background-color, #00000000);
      /* -- */
      transition:
        box-shadow var(--leftg-transition-box-shadow, 0.4s ease),
        border-radius var(--leftg-transition-border-radius, 1.0s ease),
        border-color var(--leftg-transition-border-color, 0.4s ease),
        background-color var(--leftg-transition-bg-color, 0.4s ease);
      /* Background image - Base */
      &::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 1;
        z-index: 0;
        pointer-events: none;
        border-radius: 0px;
        /* -- */
        background-position: 100% var(--leftg-image-pos, 50%);
        background-size: cover;
        background-image: var(--leftg-bg-image, none);
        background-repeat: no-repeat;
        /* -- */
        filter:
          brightness(var(--leftg-filter-brightness, 1))
          contrast(var(--leftg-filter-contrast, 1))
          grayscale(var(--leftg-filter-grayscale, 0))
          hue-rotate(var(--leftg-filter-hue-rotate, 0deg))
          invert(var(--leftg-filter-invert, 0))
          opacity(var(--leftg-filter-opacity, 1))
          saturate(var(--leftg-filter-saturate, 1))
          sepia(var(--leftg-filter-sepia, 0));
        /* -- */
        transition:
          filter var(--leftg-transition-filter, 0.4s ease),
          opacity var(--leftg-transition-bg-image, 0.4s ease);
      }
      /* Background Image - Hover */
      &::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0;
        z-index: 0;
        pointer-events: none;
        border-radius: 0px;
        /* -- */
        background-position: 100% var(--leftg-image-pos, 50%);
        background-size: cover;
        background-image: var(--leftg-bg-image-hover, none);
        background-repeat: no-repeat;
        /* -- */
        filter:
          brightness(var(--leftg-filter-brightness-hover, 1))
          contrast(var(--leftg-filter-contrast-hover, 1))
          grayscale(var(--leftg-filter-grayscale-hover, 0))
          hue-rotate(var(--leftg-filter-hue-rotate-hover, 0deg))
          invert(var(--leftg-filter-invert-hover, 0))
          opacity(var(--leftg-filter-opacity-hover, 1))
          saturate(var(--leftg-filter-saturate-hover, 1))
          sepia(var(--leftg-filter-sepia-hover, 0));
        /* -- */
        transition:
          filter var(--leftg-transition-filter, 0.4s ease),
          opacity var(--leftg-transition-bg-image, 0.4s ease);
      }
      /* Ensure modules dont go under */
      > * {
        position: relative;
        z-index: 2;
      }
      /* -- */
      &:hover {
        border-top-color: var(--leftg-hovered-top-border-color, #00000000);
        border-right-color: var(--leftg-hovered-right-border-color, #00000000);
        border-bottom-color: var(--leftg-hovered-bottom-border-color, #00000000);
        border-left-color: var(--leftg-hovered-left-border-color, #00000000);
        /* -- */
        border-top-left-radius: var(--leftg-top-left-border-radius-hovered, 13px);
        border-bottom-left-radius: var(--leftg-bottom-left-border-radius-hovered, 13px);
        border-top-right-radius: var(--leftg-top-right-border-radius-hovered, 13px);
        border-bottom-right-radius: var(--leftg-bottom-right-border-radius-hovered, 13px);
        /* -- */
        box-shadow: var(--leftg-hovered-box-shadow, 0px 0px 0px 0px) var(--leftg-hovered-bshadow-color, #00000000);
        /* -- */
        background-color: var(--leftg-background-color-hover, #00000000);
        /* -- */
        border-top-style: var(--leftg-topborder-style-hovered, solid);
        border-right-style: var(--leftg-rightborder-style-hovered, solid);
        border-bottom-style: var(--leftg-bottomborder-style-hovered, solid);
        border-left-style: var(--leftg-leftborder-style-hovered, solid);
        &::before {
          opacity: 0;
        }
        &::after {
          opacity: 1;
        }
