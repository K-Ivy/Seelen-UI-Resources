          opacity: 0;
        }
        /* -- */
        &::after {
          opacity: 1;
        }
      }
    }

    /* ? Named & Numbered Workspace Current - Active */
    #\@default\/workspaces-numbered .ft-bar-item-active,
    #\@default\/workspaces-named .ft-bar-item-active {
      color: var(--active-name-num-work-color, #bcc0c2) !important;
      background-color: var(--active-name-num-work-bgcolor, #474a4a);
      /* ---- */
      border-top: var(--active-name-num-work-bdr-thickness, 2px) var(--active-name-num-work-bdr-style-top, solid) var(--active-name-num-work-bdr-color-top, #3f4242);
      border-bottom: var(--active-name-num-work-bdr-thickness, 2px) var(--active-name-num-work-bdr-style-bot, solid) var(--active-name-num-work-bdr-color-bot, #3f4242);
      border-right: var(--active-name-num-work-bdr-thickness, 2px) var(--active-name-num-work-bdr-style-right, solid) var(--active-name-num-work-bdr-color-right, #3f4242);
