              - group:
                  header: " Border"
                  items:
                    - syntax: <length>
                      name: '--ftbr-border-thickness'
                      label: "● Thickness"
                      initialValue: 2
                      initialValueUnit: 'px'

                    - syntax: <color>
                      name: '--ftbr-top-border-color'
                      label: "● Top Color"
                      initialValue: '#29292933'

                    - syntax: <color>
                      name: '--toolbar-hovered-top-border-color'
                      label: "╰・Color on Hover"
                      initialValue: '#31323366'

                    - syntax: <string>
                      name: '--ftbr-topborder-style'
                      label: "╰─ Style"
                      initialValue: 'solid'
                      options:
                        - solid
                        - dashed
                        - dotted
                        - groove
                        - ridge

                    - syntax: <string>
                      name: '--toolbar-basel-topborder-style-hovered'
                      label: "  ╰・Style on Hover"
                      initialValue: 'solid'
                      options:
                        - solid
                        - dashed
                        - dotted
                        - groove
                        - ridge

                    - syntax: <color>
                      name: '--ftbr-bottom-border-color'
                      label: "● Bottom Color"
                      initialValue: '#29292933'

                    - syntax: <color>
                      name: '--toolbar-hovered-bottom-border-color'
                      label: "╰・Color on Hover"
                      initialValue: '#31323366'

                    - syntax: <string>
                      name: '--ftbr-bottomborder-style'
                      label: "╰─ Style"
                      initialValue: 'solid'
                      options:
                        - solid
                        - dashed
                        - dotted
                        - groove
                        - ridge

                    - syntax: <string>
                      name: '--toolbar-basel-bottomborder-style-hovered'
