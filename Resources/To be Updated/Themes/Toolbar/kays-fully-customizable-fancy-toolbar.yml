styles:
  '@seelen/fancy-toolbar': |
    /* Font */
    .ft-bar-item {
      font-family: var(--ftbr-toolbar-font, inherit);
    }
    /* -----------------------------------------
    ! Main Controls
    ----------------------------------------- */
    #root {
      --ftbr-base-width-s: var(--ftbr-toolbar-base-width-str, 99.4%);
      --ftbr-state-width-s: var(--ftbr-toolbar-state-width-stra, 99.4%);
      /* * Keep toolbar centered */
      left: 50%;
      transform: translateX(-50%);
      /* -- */
      width: var(--ftbr-base-width-s) !important;
      transition:
        transform 0.4s ease,
        width var(--toolbar-width-on-maximized-transition, 0.8s ease) !important;
      /* * Toolbar distance from top/bottom */
      &:has(.ft-bar.top) {
        top: var(--ftbr-distance-top, 5px) !important;
      }
      &:has(.ft-bar.bottom) {
        bottom: var(--ftbr-distance-bottom, 5px) !important;
      }
      /* * Distance from top/bottom when a Window is Maximized */
      &:has(.ft-bar.top[data-there-is-maximized-on-background="true"]) {
        top: var(--ftbr-toolbar-distance-maximized-topa, 5px) !important;
      }
      &:has(.ft-bar.bottom[data-there-is-maximized-on-background="true"]) {
        bottom: var(--ftbr-toolbar-distance-maximized-bottoma, 5px) !important;
      }
      /* ----------------------------------------------------
      ! v2.4.3 Issue Fix:
      ! - The translate(X) wasn't applied to the hidden state.
      ----------------------------------------------------- */
      &:has(.ft-bar-hidden.top:not(:hover)) {
        transform: translateX(-50%) translateY(calc(var(--ftbr-hidden-offset-top, 41px) * -1)) !important;
      }
      &:has(.ft-bar-hidden.bottom:not(:hover)) {
        transform: translateX(-50%) translateY(calc(var(--ftbr-hidden-offset-bottom, 41px))) !important;
      }
      /* -------------------------------------------
      ! Changes to happen when a Window is Maximized
      ------------------------------------------- */
      &:has(.ft-bar[data-there-is-maximized-on-background="true"]) {
        /* ? Toolbar width and height */
        width: var(--ftbr-state-width-s) !important;
        :is(.ft-bar, .ft-bar-left, .ft-bar-center, .ft-bar-right) {
          height: var(--ftbr-toolbar-state-height-strs, 36px) !important;
        }
        /* ? Module height and padding */
        .ft-bar-item {
          height: var(--ftbr-module-state-heighta, 26px) !important;
          /* -- */
          padding-left: var(--ftbr-module-leftright-padding-maximizeda, 10px) !important;
          padding-right: var(--ftbr-module-leftright-padding-maximizeda, 10px) !important;
          padding-top: var(--ftbr-module-updown-padding-maximized, 0px) !important;
          padding-bottom: var(--ftbr-module-updown-padding-maximized, 0px) !important;
        }
        /* ? Indiviual rounding control */
        .bg-layers > .bg-layer-1,
        .bg-layers > .bg-layer-2 {
          border-top-left-radius: var(--ftbr-force-mtbr-bdr-bg-tla, 13px);
          border-top-right-radius: var(--ftbr-force-mtbr-bdr-bg-tra, 13px);
          border-bottom-left-radius: var(--ftbr-force-mtbr-bdr-bg-bla, 13px);
          border-bottom-right-radius: var(--ftbr-force-mtbr-bdr-bg-bra, 13px);
        }
        .ft-bar-left {
          border-top-left-radius: var(--ftbr-force-mtbr-bdr-left-tla, 13px);
          border-top-right-radius: var(--ftbr-force-mtbr-bdr-left-tra, 13px);
          border-bottom-left-radius: var(--ftbr-force-mtbr-bdr-left-bla, 13px);
          border-bottom-right-radius: var(--ftbr-force-mtbr-bdr-left-bra, 13px);
        }
        .ft-bar-center {
          border-top-left-radius: var(--ftbr-force-mtbr-bdr-center-tla, 13px);
          border-top-right-radius: var(--ftbr-force-mtbr-bdr-center-tra, 13px);
          border-bottom-left-radius: var(--ftbr-force-mtbr-bdr-center-bla, 13px);
          border-bottom-right-radius: var(--ftbr-force-mtbr-bdr-center-bra, 13px);
        }
        .ft-bar-right {
          border-top-left-radius: var(--ftbr-force-mtbr-bdr-right-tla, 13px);
          border-top-right-radius: var(--ftbr-force-mtbr-bdr-right-tra, 13px);
          border-bottom-left-radius: var(--ftbr-force-mtbr-bdr-right-bla, 13px);
          border-bottom-right-radius: var(--ftbr-force-mtbr-bdr-right-bra, 13px);
        }
        /* * Drop-shadow control - Remove all by default */
        .ft-bar {
          box-shadow: var(--toolbar-onmax-base-drop-shadow-control, 0px 0px 0px 0px) var(--toolbar-onmax-base-drop-shadow-color, #00000000) !important;
        }
        .ft-bar-left {
          box-shadow: var(--toolbar-onmax-leftg-drop-shadow-control, 0px 0px 0px 0px) var(--toolbar-onmax-leftg-drop-shadow-color, #00000000) !important;
        }
        .ft-bar-center {
          box-shadow: var(--toolbar-onmax-centerg-drop-shadow-control, 0px 0px 0px 0px) var(--toolbar-onmax-centerg-drop-shadow-color, #00000000) !important;
        }
        .ft-bar-right {
          box-shadow: var(--toolbar-onmax-rightg-drop-shadow-control, 0px 0px 0px 0px) var(--toolbar-onmax-rightg-drop-shadow-color, #00000000) !important;
        }
        .ft-bar-item {
          box-shadow: var(--toolbar-onmax-modules-drop-shadow-control, 0px 2px 3px 0px) var(--toolbar-onmax-modules-drop-shadow-color, #00000080) !important;
        }
        /* * Group seperation */
        .ft-bar {
          gap: var(--ftbr-max-state-group-seperation, 6px) !important;
        }
      }
      /* -------------------------------------------
      ! Changes to happen when a Window is Maximized
      ! AND Dynamic Color is enabled
      ! Dynamic color has been removed as of latest.
      ------------------------------------------- */
      /* &:has(.ft-bar[data-dynamic-color="true"][data-there-is-maximized-on-background="true"]) {
        :is(.ft-bar .bg-layer-2, .ft-bar-left, .ft-bar-center, .ft-bar-right) {
          background-color: var(--color-maximized-on-bg-background) !important;
          border-color: var(--color-maximized-on-bg-background);
        }
        .ft-bar {
          gap: 0px !important;
        }
      } */
    }
    .ft-bar {
      height: var(--ftbr-toolbar-base-height-str, 36px) !important;
    }

    /* -----------------------------------------
    ! Toolbar Base Layer
    ----------------------------------------- */
    .ft-bar {
      box-shadow: var(--toolbar-basel-bshadow, 0px 0px 0px 0px) var(--toolbar-basel-bshadow-color, #00000000);
      /* -- */
      border-top-left-radius: var(--ftbr-top-left-border-radius, 13px);
      border-bottom-left-radius: var(--ftbr-bottom-left-border-radius, 13px);
      border-top-right-radius: var(--ftbr-top-right-border-radius, 13px);
      border-bottom-right-radius: var(--ftbr-bottom-right-border-radius, 13px);
      /* -- */
      transition:
        border-radius var(--toolbar-basel-border-radius-transition, 1.0s ease),
        box-shadow var(--toolbar-basel-drop-shadow-transition, 0.4s ease);
      /* -- */
      .bg-layer-1 {
        border-top-left-radius: var(--ftbr-top-left-border-radius, 13px);
        border-bottom-left-radius: var(--ftbr-bottom-left-border-radius, 13px);
        border-top-right-radius: var(--ftbr-top-right-border-radius, 13px);
        border-bottom-right-radius: var(--ftbr-bottom-right-border-radius, 13px);
        /* -- */
        background-position: 100% var(--ftbr-basel-image-pos, 50%);
        background-size: cover;
        background-image: var(--ftbr-basel-bg-image, none);
        background-repeat: no-repeat;
        background-color: transparent;
        /* -- */
        filter:
          brightness(var(--ftbr-main-filter-brightness, 1))
          contrast(var(--ftbr-main-filter-contrast, 1))
          grayscale(var(--ftbr-main-filter-grayscale, 0))
          hue-rotate(var(--ftbr-main-filter-hue-rotate, 0deg))
          invert(var(--ftbr-main-filter-invert, 0))
          opacity(var(--ftbr-main-filter-opacity, 1))
          saturate(var(--ftbr-main-filter-saturate, 1))
          sepia(var(--ftbr-main-filter-sepia, 0));
        /* -- */
        transition:
          border-radius var(--toolbar-basel-border-radius-transition, 1.0s ease),
          filter var(--toolbar-basel-filter-transition, 0.4s ease);
        /* -- */
        &::after {
          content: "";
          position: absolute;
          inset: 0;
          /* -- */
          border-top-left-radius: var(--ftbr-top-left-border-radius, 13px);
          border-bottom-left-radius: var(--ftbr-bottom-left-border-radius, 13px);
          border-top-right-radius: var(--ftbr-top-right-border-radius, 13px);
          border-bottom-right-radius: var(--ftbr-bottom-right-border-radius, 13px);
          /* -- */
          background-repeat: no-repeat;
          background-position: 100% var(--ftbr-basel-image-pos, 50%);
          background-size: cover;
          background-image: var(--ftbr-basel-bg-image-hover, none);
          opacity: 0;
          transition:
            opacity var(--toolbar-basel-background-image-transition, 0.4s ease);
        }
      }
      /* -- */
      .bg-layer-2 {
        background-color: var(--ftbr-background-color, #222222CC);
        /* -- */
        border-top: var(--ftbr-border-thickness, 2px) var(--ftbr-topborder-style, solid) var(--ftbr-top-border-color, #29292933);
        border-bottom: var(--ftbr-border-thickness, 2px) var(--ftbr-bottomborder-style, solid) var(--ftbr-bottom-border-color, #29292933);
        border-right: var(--ftbr-border-thickness, 2px) var(--ftbr-rightborder-style, solid) var(--ftbr-right-border-color, #29292933);
        border-left: var(--ftbr-border-thickness, 2px) var(--ftbr-leftborder-style, solid) var(--ftbr-left-border-color, #29292933);
        /* -- */
        border-top-left-radius: var(--ftbr-top-left-border-radius, 13px);
        border-bottom-left-radius: var(--ftbr-bottom-left-border-radius, 13px);
        border-top-right-radius: var(--ftbr-top-right-border-radius, 13px);
        border-bottom-right-radius: var(--ftbr-bottom-right-border-radius, 13px);
        /* -- */
        transition:
          background-color var(--toolbar-basel-background-color-transition, 0.4s ease),
          border-color var(--toolbar-basel-border-color-transition, 0.4s ease),
          border-radius var(--toolbar-basel-border-radius-transition, 1.0s ease);
      }
      /* -- */
      &:hover {
        box-shadow: var(--toolbar-basel-bshadow-hovered, 0px 0px 0px 0px) var(--toolbar-basel-bshadow-color-hovered, #00000000);
        /* -- */
        border-top-left-radius: var(--ftbr-top-left-border-radius-hovered, 13px);
        border-bottom-left-radius: var(--ftbr-bottom-left-border-radius-hovered, 13px);
        border-top-right-radius: var(--ftbr-top-right-border-radius-hovered, 13px);
        border-bottom-right-radius: var(--ftbr-bottom-right-border-radius-hovered, 13px);
        /* -- */
        .bg-layer-1 {
          border-top-left-radius: var(--ftbr-top-left-border-radius-hovered, 13px);
          border-bottom-left-radius: var(--ftbr-bottom-left-border-radius-hovered, 13px);
          border-top-right-radius: var(--ftbr-top-right-border-radius-hovered, 13px);
          border-bottom-right-radius: var(--ftbr-bottom-right-border-radius-hovered, 13px);
          /* -- */
          filter:
            brightness(var(--ftbr-main-filter-brightness-hover, 1))
            contrast(var(--ftbr-main-filter-contrast-hover, 1))
            grayscale(var(--ftbr-main-filter-grayscale-hover, 0))
            hue-rotate(var(--ftbr-main-filter-hue-rotate-hover, 0deg))
            invert(var(--ftbr-main-filter-invert-hover, 0))
            opacity(var(--ftbr-main-filter-opacity-hover, 1))
            saturate(var(--ftbr-main-filter-saturate-hover, 1))
            sepia(var(--ftbr-main-filter-sepia-hover, 0));
          /* -- */
          &::after {
            opacity: 1;
          }
        }
        /* -- */
        .bg-layer-2 {
          background-color: var(--ftbr-background-color-hover, #222222CC);
          /* -- */
          border-top-color: var(--toolbar-hovered-top-border-color, #31323366);
          border-right-color: var(--toolbar-hovered-right-border-color, #31323366);
          border-bottom-color: var(--toolbar-hovered-bottom-border-color, #31323366);
          border-left-color: var(--toolbar-hovered-left-border-color, #31323366);
          /* -- */
          border-top-left-radius: var(--ftbr-top-left-border-radius-hovered, 13px);
          border-bottom-left-radius: var(--ftbr-bottom-left-border-radius-hovered, 13px);
          border-top-right-radius: var(--ftbr-top-right-border-radius-hovered, 13px);
          border-bottom-right-radius: var(--ftbr-bottom-right-border-radius-hovered, 13px);
          /* -- */
          border-top-style: var(--toolbar-basel-topborder-style-hovered, solid);
          border-right-style: var(--toolbar-basel-rightborder-style-hovered, solid);
          border-bottom-style: var(--toolbar-basel-bottomborder-style-hovered, solid);
          border-left-style: var(--toolbar-basel-leftborder-style-hovered, solid);
        }
      }
    }

    /* -----------------------------------------
    ! All Group Controls
    ----------------------------------------- */
    /* ! forgot what issue is caused when value is set to max-content but need
    to fix it */
    .ft-bar-left,
    .ft-bar-center,
    .ft-bar-right {
      max-width: var(--ftbr-group-max-content, none) !important;
    }

    /* -----------------------------------------
    ! Left Group
    ----------------------------------------- */

    .ft-bar-left {
      position: relative;
      margin-bottom: var(--leftg-vertical-pos, 0px) !important;
      margin-left: var(--leftg-horizontal-pos, -14px) !important;
      /* -- */
      padding-top: var(--leftg-top-padding, 3px) !important;
      padding-bottom: var(--leftg-bottom-padding, 3px) !important;
      padding-left: var(--leftg-left-padding, 3px) !important;
