          contrast(var(--centerg-filter-contrast, 1))
          grayscale(var(--centerg-filter-grayscale, 0))
          hue-rotate(var(--centerg-filter-hue-rotate, 0deg))
          invert(var(--centerg-filter-invert, 0))
          opacity(var(--centerg-filter-opacity, 1))
          saturate(var(--centerg-filter-saturate, 1))
          sepia(var(--centerg-filter-sepia, 0));
        /* -- */
        transition:
          filter var(--centerg-transition-filter, 0.4s ease),
          opacity var(--centerg-transition-bg-image, 0.4s ease);
      }
      /* Background Image - Hover */
      &::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0;
        z-index: 0;
        pointer-events: none;
        /* -- */
        border-top-left-radius: max(calc(var(--centerg-top-left-border-radius-hovered, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        border-top-right-radius: max(calc(var(--centerg-top-right-border-radius-hovered, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        border-bottom-right-radius: max(calc(var(--centerg-bottom-right-border-radius-hovered, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        border-bottom-left-radius: max(calc(var(--centerg-bottom-left-border-radius-hovered, 13px) - var(--centerg-graphic-radius-subcorr, 2px)), 0px);
        /* -- */
        background-position: 100% var(--centerg-image-pos, 50%);
        background-size: cover;
        background-image: var(--centerg-bg-image-hover, none);
        background-repeat: no-repeat;
        /* -- */
        filter:
          brightness(var(--centerg-filter-brightness-hover, 1))
          contrast(var(--centerg-filter-contrast-hover, 1))
          grayscale(var(--centerg-filter-grayscale-hover, 0))
          hue-rotate(var(--centerg-filter-hue-rotate-hover, 0deg))
          invert(var(--centerg-filter-invert-hover, 0))
          opacity(var(--centerg-filter-opacity-hover, 1))
          saturate(var(--centerg-filter-saturate-hover, 1))
          sepia(var(--centerg-filter-sepia-hover, 0));
        /* -- */
        transition:
          filter var(--centerg-transition-filter, 0.4s ease),
          opacity var(--centerg-transition-bg-image, 0.4s ease);
      }
      /* Ensure modules dont go under */
      > * {
        position: relative;
        z-index: 2;
      }
