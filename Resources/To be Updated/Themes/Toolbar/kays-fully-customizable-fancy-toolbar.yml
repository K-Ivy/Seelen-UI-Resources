      border-bottom-left-radius: var(--active-name-num-work-bdr-radius-botl, 13px);
      border-top-right-radius: var(--active-name-num-work-bdr-radius-topr, 13px);
      border-bottom-right-radius: var(--active-name-num-work-bdr-radius-botr, 13px);
      /* ------- */
      transition:
        border-radius var(--workspace-nn-bdr-rounding-transition, 1.0s ease),
        border-color var(--workspace-nn-bdr-color-transition, 0.4s ease),
        color var(--workspace-nn-color-transition, 0.4s ease),
        background-color var(--workspace-nn-bg-color-transition, 0.4s ease);
      /* ------ */
      &::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 1;
        border-radius: 0px;
        z-index: 0;
        pointer-events: none;
        /* -- */
        background-position: 100% var(--active-name-num-work-image-pos, 50%);
        background-size: cover;
        background-image: var(--active-name-num-work-bg-image, none);
        background-repeat: no-repeat;
        /* -- */
        filter:
          brightness(var(--active-name-num-work-filter-brightness, 1))
          contrast(var(--active-name-num-work-filter-contrast, 1))
          grayscale(var(--active-name-num-work-filter-grayscale, 0))
          hue-rotate(var(--active-name-num-work-filter-hue-rotate, 0deg))
          invert(var(--active-name-num-work-filter-invert, 0))
          opacity(var(--active-name-num-work-filter-opacity, 1))
          saturate(var(--active-name-num-work-filter-saturate, 1))
          sepia(var(--active-name-num-work-filter-sepia, 0));
        /* -- */
        transition:
          filter var(--workspace-nn-graphic-filters-transition, 0.4s ease),
          opacity var(--workspace-nn-bg-graphic-transition, 0.4s ease);
      }
      &::after {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0;
        border-radius: 0px;
        z-index: 0;
        pointer-events: none;
        /* -- */
        background-position: 100% var(--active-name-num-work-image-pos, 50%);
        background-size: cover;
        background-image: var(--active-name-num-work-bg-image-state, none);
        background-repeat: no-repeat;
        /* -- */
        filter:
          brightness(var(--active-name-num-work-filter-brightness-hover, 1))
          contrast(var(--active-name-num-work-filter-contrast-hover, 1))
          grayscale(var(--active-name-num-work-filter-grayscale-hover, 0))
          hue-rotate(var(--active-name-num-work-filter-hue-rotate-hover, 0deg))
          invert(var(--active-name-num-work-filter-invert-hover, 0))
          opacity(var(--active-name-num-work-filter-opacity-hover, 1))
          saturate(var(--active-name-num-work-filter-saturate-hover, 1))
          sepia(var(--active-name-num-work-filter-sepia-hover, 0));
        /* -- */
        transition:
          filter var(--workspace-nn-graphic-filters-transition, 0.4s ease),
          opacity var(--workspace-nn-bg-graphic-transition, 0.4s ease);
      }
      /* Ensure text doesn't go under */
      > * {
        position: relative;
        z-index: 2;
      }
      /* ------- */
      &:active,
      &:hover {
        color: var(--active-name-num-work-color-state, #d1d4d5) !important;
        background-color: var(--active-name-num-work-bgcolor-state, #474a4a);
        /* ---- */
        border-top: var(--active-name-num-work-bdr-thickness, 2px) var(--active-name-num-work-bdr-style-top-state, solid) var(--active-name-num-work-bdr-color-top-state, #3f4242);
        border-bottom: var(--active-name-num-work-bdr-thickness, 2px) var(--active-name-num-work-bdr-style-bot-state, solid) var(--active-name-num-work-bdr-color-bot-state, #3f4242);
        border-right: var(--active-name-num-work-bdr-thickness, 2px) var(--active-name-num-work-bdr-style-right-state, solid) var(--active-name-num-work-bdr-color-right-state, #3f4242);
        border-left: var(--active-name-num-work-bdr-thickness, 2px) var(--active-name-num-work-bdr-style-left-state, solid) var(--active-name-num-work-bdr-color-left-state, #3f4242);
        border-top-left-radius: var(--active-name-num-work-bdr-radius-topl-state, 13px);
        border-bottom-left-radius: var(--active-name-num-work-bdr-radius-botl-state, 13px);
        border-top-right-radius: var(--active-name-num-work-bdr-radius-topr-state, 13px);
        border-bottom-right-radius: var(--active-name-num-work-bdr-radius-botr-state, 13px);
        /* ----- */
        &::before {
          opacity: 0;
        }
        /* -- */
        &::after {
          opacity: 1;
        }
      }
    }

     /* Dotted workspace */
