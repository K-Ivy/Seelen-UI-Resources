id: '@k-ivy/window-prev-ff'
metadata:
  displayName: "Filled Window Previews"
  author: "K-Ivy"
  description: "Makes window previews fit into their containers."
  tags: ['weg']
  appTargetVersion:
    - 2
    - 5
    - 3
settings:
  - group:
      header: "✦ Best Left Alone:"
      items:
        - syntax: <number>
          label: "● Horizontal Scale"
          name: "--weg-preview-scale-x"
          initialValue: 1.0

        - syntax: <number>
          label: "● Vertical Scale"
          name: "--weg-preview-scale-y"
          initialValue: 1.49

        - syntax: <length>
          label: "● Vertical Position"
          name: "--weg-preview-margin-top"
          initialValue: 61
          initialValueUnit: "px"
styles:
  "@seelen/weg": |
    .weg-item-preview-image-container {
      overflow: hidden;
    }

    .weg-item-preview-image {
      object-fit: fill !important; /* Better than cover (keeps image pixel clarity) */
      transform: scaleX(var(--weg-preview-scale-x, 1.0)) scaleY(var(--weg-preview-scale-y, 1.49)) !important;
      margin-top: var(--weg-preview-margin-top, 61px); /* Move stretched preview down to show from the top (more natural). To see more, setting a few px off from true top */
    }