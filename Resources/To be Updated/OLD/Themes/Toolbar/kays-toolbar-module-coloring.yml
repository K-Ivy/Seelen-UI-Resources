styles:
  '@seelen/fancy-toolbar': |
    /* Regular Modules */
    .ft-bar-item#\@default\/cpu-usage {
      color: var(--custom-cpu-color, #e49191);
    }
    .ft-bar-item#\@seelen\/tb-keyboard-selector {
      color: var(--custom-keyboard-color, #d6a589);
    }
    .ft-bar-item#\@default\/memory-usage {
      color: var(--custom-memory-color, #e9b985);
    }
    .ft-bar-item#\@seelen\/tb-calendar-popup {
      color: var(--custom-date-color, #eccb8a);
    }
    .ft-bar-item#\@default\/disk-usage {
      color: var(--custom-disk-color, #e2de93);
    }
    .ft-bar-item#\@default\/network-usage {
      color: var(--custom-network-usage-color, #afe986);
    }
    .ft-bar-item#\@seelen\/tb-system-tray {
      color: var(--custom-system-tray-color, #b0cfb5);
    }
    .ft-bar-item#\@default\/power {
      color: var(--custom-power-color, #8ce2b2);
    }
    .ft-bar-item#\@seelen\/tb-user-menu {
      color: var(--custom-user-folder-color, #bac7c1);
    }
    .ft-bar-item#\@seelen\/tb-notifications {
      color: var(--custom-notifications-color, #84bcd4);
    }
    .ft-bar-item#\@seelen\/tb-power-menu {
      color: var(--custom-power-menu-color, #64b3fd);
    }
    .ft-bar-item#\@seelen\/tb-network-popup {
      color: var(--custom-network-color, #9eb1e2);
    }
    .ft-bar-item#\@default\/focused-app-title {
      color: var(--custom-focused-app-title-color, #c6b7dc);
    }
    .ft-bar-item#\@seelen\/tb-media-popup {
      color: var(--custom-media-color, #c9a6f7);
    }
    .ft-bar-item#\@default\/focused-app {
      color: var(--custom-focused-app-color, #da9ad7);
    }
    .ft-bar-item#\@seelen\/tb-quick-settings {
      color: var(--custom-quick-settings-color, #e4b0d6);
    }
    .ft-bar-item#\@seelen\/tb-bluetooth-popup {
      color: var(--custom-bluetooth-color, #e79fb9);
    }
    /* Separators & any unadded */
    .ft-bar-item {
      color: var(--custom-seperator-color-workaround, #9ba7a5);
    }

    /* Dotted Workspace */
    #\@default\/workspaces-dotted button:nth-child(1) {
      background-color: var(--custom-workspace-one-color, #e49191) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(2) {
      background-color: var(--custom-workspace-two-color, #e8a488) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(3) {
      background-color: var(--custom-workspace-three-color, #e9b985) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(4) {
      background-color: var(--custom-workspace-four-color, #eccb8a) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(5) {
      background-color: var(--custom-workspace-five-color, #e2de93) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(6) {
      background-color: var(--custom-workspace-six-color, #c6e88d) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(7) {
      background-color: var(--custom-workspace-seven-color, #afe986) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(8) {
      background-color: var(--custom-workspace-eight-color, #96e0a0) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(9) {
      background-color: var(--custom-workspace-nine-color, #8ce2b2) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(10) {
      background-color: var(--custom-workspace-ten-color, #87d4c4) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(11) {
      background-color: var(--custom-workspace-eleven-color, #84bcd4) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(12) {
      background-color: var(--custom-workspace-twelve-color, #79aaec) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(13) {
      background-color: var(--custom-workspace-thirteen-color, #64b3fd) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(14) {
      background-color: var(--custom-workspace-fourthteen-color, #9eb1e2) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(15) {
      background-color: var(--custom-workspace-fifthteen-color, #c6b7dc) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(16) {
      background-color: var(--custom-workspace-sixteen-color, #c9a6f7) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(17) {
      background-color: var(--custom-workspace-seventeen-color, #da9ad7) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(18) {
      background-color: var(--custom-workspace-eighteen-color, #e4b0d6) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(19) {
      background-color: var(--custom-workspace-nineteen-color, #e79fb9) !important;
    }
    #\@default\/workspaces-dotted button:nth-child(20) {
      background-color: var(--custom-workspace-twenty-color, #e8909e) !important;
    }

    /* Active Workspace Indicator */
    #\@default\/workspaces-numbered button[style*="system-accent-color"],
    #\@default\/workspaces-named button[style*="system-accent-color"] {
      text-decoration: var(--custom-active-ws-underline, underline);
      text-underline-offset: calc(var(--custom-active-ws-underline-offset, 2) * 1px);
      text-decoration-thickness: var(--custom-active-ws-underline-thickness, 1px);
    }

    /* Numbered and Named Workspace */
    #\@default\/workspaces-numbered button:nth-child(1),
    #\@default\/workspaces-named button:nth-child(1) {
      color: var(--custom-workspace-one-color, #e49191) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(2),
    #\@default\/workspaces-named button:nth-child(2) {
      color: var(--custom-workspace-two-color, #e8a488) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(3),
    #\@default\/workspaces-named button:nth-child(3) {
      color: var(--custom-workspace-three-color, #e9b985) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(4),
    #\@default\/workspaces-named button:nth-child(4) {
      color: var(--custom-workspace-four-color, #eccb8a) !important;
