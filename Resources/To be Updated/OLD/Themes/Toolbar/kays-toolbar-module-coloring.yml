  - group:
      header: "✦ Active Workspace Indicator"
      items:
        - syntax: <string>
          label: "● Line"
          name: "--custom-active-ws-underline"
          initialValue: "underline"
          options: [none, underline, underline dotted, underline dashed, underline wavy, overline, overline dotted, overline dashed, overline wavy, underline overline, underline overline dotted, underline overline dashed, underline overline wavy]

        - syntax: <number>
          label: "╰・Vertical Offset"
          name: "--custom-active-ws-underline-offset"
          initialValue: 2
          options: [1, 2, 3, 4, 5]

        - syntax: <length>
          label: "╰・Thickness"
          name: "--custom-active-ws-underline-thickness"
          initialValue: 1
          initialValueUnit: "px"

  - group:
      header: "✦ Placeholder System"
      items:
        - group:
            header: "This is a system that allows you to color your custom modules (from plugins) from here. All you have to do is replace the ID of your plugin with one pre-defined in this theme, those corresponding to one of the below slots."
            items:
              - syntax: <string>
