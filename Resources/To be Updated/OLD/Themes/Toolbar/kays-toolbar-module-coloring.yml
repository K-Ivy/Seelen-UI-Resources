id: "@k-ivy/ftbr-mod-color"
metadata:
  displayName: "Indiviual Coloring of Toolbar Modules"
  author: "K-Ivy"
  description: "Color every toolbar module indiviually. In addition, adds a placeholder system to be able to color custom modules from within this theme."
  tags: ['toolbar']
  appTargetVersion:
    - 2
    - 5
    - 3
settings:
  - group:
      header: "✦ Regular Modules"
      items:
        - syntax: <color>
          label: "● CPU Usage"
          name: "--custom-cpu-color"
          initialValue: "#e49191"

        - syntax: <color>
          label: "● Keyboard Selector"
          name: "--custom-keyboard-color"
          initialValue: "#d6a589"

        - syntax: <color>
