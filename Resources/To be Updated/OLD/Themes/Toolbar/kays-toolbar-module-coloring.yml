    #\@default\/workspaces-numbered button:nth-child(5),
    #\@default\/workspaces-named button:nth-child(5) {
      color: var(--custom-workspace-five-color, #e2de93) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(6),
    #\@default\/workspaces-named button:nth-child(6) {
      color: var(--custom-workspace-six-color, #c6e88d) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(7),
    #\@default\/workspaces-named button:nth-child(7) {
      color: var(--custom-workspace-seven-color, #afe986) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(8),
    #\@default\/workspaces-named button:nth-child(8) {
      color: var(--custom-workspace-eight-color, #96e0a0) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(9),
    #\@default\/workspaces-named button:nth-child(9) {
      color: var(--custom-workspace-nine-color, #8ce2b2) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(10),
    #\@default\/workspaces-named button:nth-child(10) {
      color: var(--custom-workspace-ten-color, #87d4c4) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(11),
    #\@default\/workspaces-named button:nth-child(11) {
      color: var(--custom-workspace-eleven-color, #84bcd4) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(12),
    #\@default\/workspaces-named button:nth-child(12) {
      color: var(--custom-workspace-twelve-color, #79aaec) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(13),
    #\@default\/workspaces-named button:nth-child(13) {
      color: var(--custom-workspace-thirteen-color, #64b3fd) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(14),
    #\@default\/workspaces-named button:nth-child(14) {
      color: var(--custom-workspace-fourthteen-color, #9eb1e2) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(15),
    #\@default\/workspaces-named button:nth-child(15) {
      color: var(--custom-workspace-fifthteen-color, #c6b7dc) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(16),
    #\@default\/workspaces-named button:nth-child(16) {
      color: var(--custom-workspace-sixteen-color, #c9a6f7) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(17),
    #\@default\/workspaces-named button:nth-child(17) {
      color: var(--custom-workspace-seventeen-color, #da9ad7) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(18),
    #\@default\/workspaces-named button:nth-child(18) {
      color: var(--custom-workspace-eighteen-color, #e4b0d6) !important;
