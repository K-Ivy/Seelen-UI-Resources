    #\@default\/workspaces-numbered button:nth-child(19),
    #\@default\/workspaces-named button:nth-child(19) {
      color: var(--custom-workspace-nineteen-color, #e79fb9) !important;
    }
    #\@default\/workspaces-numbered button:nth-child(20),
    #\@default\/workspaces-named button:nth-child(20) {
      color: var(--custom-workspace-twenty-color, #e8909e) !important;
    }

    /* Placeholder System */
