id: "@k-ivy/media-thumb-fill"
metadata:
  displayName: "Filled Media Thumbnails"
  description: "Makes thumbnails fill their containers."
  author: "K-Ivy"
  tags: ['weg', 'media-popup']
  appTargetVersion:
    - 2
    - 5
    - 6
styles:
  "@seelen/weg": |
    .media-session {
      .media-session-thumbnail {
        object-fit: cover !important;
      }
    }

  "@seelen/media-popup": |
    .media-session {
      .media-session-thumbnail {
        object-fit: cover !important;
      }
    }