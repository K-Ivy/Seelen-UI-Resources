id: '@k-ivy/custom-pref-user'
metadata:
  displayName: "Custom Username"
  author: "K-Ivy"
  description: "Replace the toolbar and user menu username with a custom one."
  tags: ['toolbar']
  appTargetVersion:
    - 2
    - 5
    - 3
settings:
  - group:
      header: "✦ Custom User"
      items:
        - syntax: <string>
          name: "--usr-custom-username"
          label: "● Username (Inside Quotes)"
          initialValue: '"Replace Me"'

        - syntax: <length>
          name: "--ftbr-toolbar-username-dist-pfp"
          label: "╰・Distance from Profile Picture"
          initialValue: 0
          initialValueUnit: "px"

        - syntax: <string>
          name: "--win-username-visibility"
          label: "● Window's Username Visibility"
          tip: "none = hide | block = show"
          initialValue: 'none'
          options: [none, block]

styles:
  '@seelen/fancy-toolbar': |
    /* Hide window's username */
    #\@seelen\/tb-user-menu > div > span:nth-child(3) {
      display: var(--win-username-visibility, none) !important;
    }

    /* Inject custom name */
    #\@seelen\/tb-user-menu .ft-bar-item-content::after {
      content: var(--usr-custom-username, "");
      margin-left: var(--ftbr-toolbar-username-dist-pfp, 0px);
    }

  '@seelen/user-menu': |
    /* Hide window's username */
    .user-profile-name > span {
      display: var(--win-username-visibility, none) !important;
    }

    /* Inject custom name */
    .user-profile-name::before {
      content: var(--usr-custom-username, "");
      flex: 1;
      white-space: normal;
      word-break: break-word;
    }