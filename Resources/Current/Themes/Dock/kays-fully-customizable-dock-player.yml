styles:
  "@seelen/weg": |
    :root {
      --fixed-wth-base: calc(var(--config-item-size) + var(--dock-mediapl-standard-size-cal, 0px));
      --fixed-wth-state: calc(var(--config-item-size) + var(--dock-mediapl-added-size, 106px));
      --graphic-blur: blur(6px) brightness(125%) contrast(125%);
      --title-marquee: marquee var(--dock-mediapl-marquee-time, 18s) linear infinite;
    }

    .weg-item.media-session-container-horizontal {
      width: var(--dock-mediapl-width, var(--fixed-wth-base)) !important;
      min-width: unset;
      max-width: var(--dock-mediapl-max-width, unset) !important;
      /* --- */
      box-shadow: none !important;
      transition:
        width var(--dock-mediapl-width-transition, 400ms ease) !important;

      &:hover {
        width: var(--dock-mediapl-width-state, var(--fixed-wth-state)) !important;
      }
    }

    .weg-item.media-session-container-vertical {
      height: var(--dock-mediapl-width, var(--fixed-wth-base)) !important;
      min-height: unset;
      max-height: var(--dock-mediapl-max-width, unset) !important;
      /* --- */
      box-shadow: none !important;
      transition:
        height var(--dock-mediapl-width-transition, 400ms ease) !important;

      &:hover {
        height: var(--dock-mediapl-width-state, var(--fixed-wth-state)) !important;
      }
    }

    .media-session {
      background-color: var(--dock-mediapl-edge-glow, #ADADAD) !important;
      /* --- */
      filter:
        brightness(var(--dock-mediapl-brightness, 1))
        contrast(var(--dock-mediapl-contrast, 1))
        grayscale(var(--dock-mediapl-grayscale, 0))
        hue-rotate(var(--dock-mediapl-hue-rotate, 0deg))
        invert(var(--dock-mediapl-invert, 0))
        saturate(var(--dock-mediapl-saturate, 1))
        sepia(var(--dock-mediapl-sepia, 0));
      opacity: var(--dock-mediapl-opacity, 1);
      /* --- */
      border-width: var(--dock-mediapl-border-thickness, 0px);
      border-style:
        var(--dock-mediapl-top-border-style, solid)
        var(--dock-mediapl-right-border-style, solid)
        var(--dock-mediapl-bottom-border-style, solid)
        var(--dock-mediapl-left-border-style, solid);
      border-radius:
        var(--dock-mediapl-top-left-border-radius, 10px)
        var(--dock-mediapl-top-right-border-radius, 10px)
        var(--dock-mediapl-bottom-right-border-radius, 10px)
        var(--dock-mediapl-bottom-left-border-radius, 10px);
      /* --- */
      box-shadow:
        var(--dock-mediapl-shadow-x, 0px)
        var(--dock-mediapl-shadow-y, 2px)
        var(--dock-mediapl-shadow-blur, 3px)
        var(--dock-mediapl-shadow-spread, 0px)
        var(--dock-mediapl-shadow-color, #00000080);
      /* --- */
      transition:
        filter var(--dock-mediapl-filter-transition, 0.4s ease),
        opacity var(--dock-mediapl-filter-transition, 0.4s ease),
        border-radius var(--dock-mediapl-border-radius-transition, 1.0s ease),
        border-color var(--dock-mediapl-border-color-transition, 0.4s ease),
        box-shadow var(--dock-mediapl-shadow-transition, 0.4s ease);

      &:hover {
        filter:
          brightness(var(--dock-mediapl-brightness-state, 1))
          contrast(var(--dock-mediapl-contrast-state, 1))
          grayscale(var(--dock-mediapl-grayscale-state, 0))
          hue-rotate(var(--dock-mediapl-hue-rotate-state, 0deg))
          invert(var(--dock-mediapl-invert-state, 0))
          saturate(var(--dock-mediapl-saturate-state, 1))
          sepia(var(--dock-mediapl-sepia-state, 0));
        opacity: var(--dock-mediapl-opacity-state, 1);
        /* --- */
        border-style:
          var(--dock-mediapl-top-border-style-state, solid)
          var(--dock-mediapl-right-border-style-state, solid)
          var(--dock-mediapl-bottom-border-style-state, solid)
          var(--dock-mediapl-left-border-style-state, solid);
        border-radius:
          var(--dock-mediapl-top-left-border-radius-state, 10px)
          var(--dock-mediapl-top-right-border-radius-state, 10px)
          var(--dock-mediapl-bottom-right-border-radius-state, 10px)
          var(--dock-mediapl-bottom-left-border-radius-state, 10px);
        /* --- */
        box-shadow:
          var(--dock-mediapl-shadow-x-state, 0px)
          var(--dock-mediapl-shadow-y-state, 2px)
          var(--dock-mediapl-shadow-blur-state, 3px)
          var(--dock-mediapl-shadow-spread-state, 0px)
          var(--dock-mediapl-shadow-color-state, #00000080);
      }
    }

    /* thumbnail bg = light/bright (dark text) */
    .media-session:has(.media-session-title[style*="color: rgb(34, 34, 34)"]) {
      border-color:
        var(--dock-mediapl-top-border-color-light-bg, #00000000)
        var(--dock-mediapl-right-border-color-light-bg, #00000000)
        var(--dock-mediapl-bottom-border-color-light-bg, #00000000)
        var(--dock-mediapl-left-border-color-light-bg, #00000000);

      &:hover {
        border-color:
          var(--dock-mediapl-top-border-color-light-bg-state, #00000000)
          var(--dock-mediapl-right-border-color-light-bg-state, #00000000)
          var(--dock-mediapl-bottom-border-color-light-bg-state, #00000000)
          var(--dock-mediapl-left-border-color-light-bg-state, #00000000);
      }
    }

    /* thumbnail bg = dark (white text) */
    .media-session:has(.media-session-title[style*="color: rgb(239, 239, 239)"]) {
      border-color:
        var(--dock-mediapl-top-border-color-dark-bg, #00000000)
        var(--dock-mediapl-right-border-color-dark-bg, #00000000)
        var(--dock-mediapl-bottom-border-color-dark-bg, #00000000)
        var(--dock-mediapl-left-border-color-dark-bg, #00000000);

      &:hover {
        border-color:
          var(--dock-mediapl-top-border-color-dark-bg-state, #00000000)
          var(--dock-mediapl-right-border-color-dark-bg-state, #00000000)
          var(--dock-mediapl-bottom-border-color-dark-bg-state, #00000000)
          var(--dock-mediapl-left-border-color-dark-bg-state, #00000000);
      }
    }

    /* only hide when no media b/c the default img itself hides when media is playing for the thumbnail */
    .weg-item:has(.media-session-title-default) .media-session-thumbnail-container > img {
      display: var(--dock-mediapl-thumb-placeholder-display, block) !important;
    }

    .media-session-thumbnail-container > img {
      display: var(--dock-mediapl-thumb-display, block) !important;
    }

    .media-session-blurred-thumbnail-container > img {
      display: var(--dock-mediapl-cover-display, block) !important;
    }

    .media-session-thumbnail {
      object-fit: var(--dock-mediapl-thumb-fit-mode, cover) !important;
    }

    /* -----------------------------------------
    ! Dynamic Backgrounds
    ----------------------------------------- */

    /* thumbnail bg = light/bright (dark text) */
    .media-session:has(.media-session-title[style*="color: rgb(34, 34, 34)"]) {
      .media-session-thumbnail-container {
        position: relative;
        background-color: var(--dock-mediapl-thumb-bg-color-light, #00000000);

        &::before {
          content: "";
          position: absolute;
          inset: 0;
          background-size: cover;
          background-repeat: no-repeat;
          /* --- */
          background-position:
            var(--dock-mediapl-thumb-pos-x, 50%)
            var(--dock-mediapl-thumb-pos-y, 50%);
          background-image: var(--dock-mediapl-thumb-bg-image-light, none);
        }
      }

      .media-session-blurred-thumbnail-container {
        position: relative;
        background-color: var(--dock-mediapl-content-bg-color-light, #00000000);

        &::before {
          content: "";
          position: absolute;
          inset: 0;
          background-size: cover;
          background-repeat: no-repeat;
          filter: var(--dock-mediapl-content-image-blur, none);
          /* --- */
          background-position:
            var(--dock-mediapl-content-pos-x, 50%)
            var(--dock-mediapl-content-pos-y, 50%);
          background-image: var(--dock-mediapl-content-bg-image-light, none);
        }
      }
    }

    /* thumbnail bg = dark (white text) */
    .media-session:has(.media-session-title[style*="color: rgb(239, 239, 239)"]) {
      .media-session-thumbnail-container {
        position: relative;
        background-color: var(--dock-mediapl-thumb-bg-color-dark, #00000000);

        &::before {
          content: "";
          position: absolute;
          inset: 0;
          background-size: cover;
          background-repeat: no-repeat;
          /* --- */
          background-position:
            var(--dock-mediapl-thumb-pos-x, 50%)
            var(--dock-mediapl-thumb-pos-y, 50%);
          background-image: var(--dock-mediapl-thumb-bg-image-dark, none);
        }
      }

      .media-session-blurred-thumbnail-container {
        position: relative;
        background-color: var(--dock-mediapl-content-bg-color-dark, #00000000);

        &::before {
          content: "";
          position: absolute;
          inset: 0;
          background-size: cover;
          background-repeat: no-repeat;
          filter: var(--dock-mediapl-content-image-blur, none);
          /* --- */
          background-position:
            var(--dock-mediapl-content-pos-x, 50%)
            var(--dock-mediapl-content-pos-y, 50%);
          background-image: var(--dock-mediapl-content-bg-image-dark, none);
        }
      }
    }

    /* -----------------------------------------
    ! Player Button
    ----------------------------------------- */

    .media-session-actions button {
      background-color: var(--dock-mediapl-btn-bg-color-on-dark, #00000000) !important;
      /* --- */
      border-width: var(--dock-mediapl-btn-bdr-thickness, 0px) !important;
      border-style:
        var(--dock-mediapl-btn-top-border-style, solid)
        var(--dock-mediapl-btn-right-border-style, solid)
        var(--dock-mediapl-btn-bottom-border-style, solid)
        var(--dock-mediapl-btn-left-border-style, solid) !important;
      border-color:
        var(--dock-mediapl-btn-top-border-color-on-dark, #00000000)
        var(--dock-mediapl-btn-right-border-color-on-dark, #00000000)
        var(--dock-mediapl-btn-bottom-border-color-on-dark, #00000000)
        var(--dock-mediapl-btn-left-border-color-on-dark, #00000000) !important;
      border-radius:
        var(--dock-mediapl-btn-top-left-border-radius, 10px)
        var(--dock-mediapl-btn-top-right-border-radius, 10px)
        var(--dock-mediapl-btn-bottom-right-border-radius, 10px)
        var(--dock-mediapl-btn-bottom-left-border-radius, 10px) !important;
      box-shadow:
        var(--dock-mediapl-btn-shadow-x, 0px)
        var(--dock-mediapl-btn-shadow-y, 0px)
        var(--dock-mediapl-btn-shadow-blur, 0px)
        var(--dock-mediapl-btn-shadow-spread, 0px)
        var(--dock-mediapl-btn-shadow-color-on-dark, #00000000) !important;
      /* --- */
      transition:
        background-color var(--dock-mediapl-btn-bg-transition, 0.4s ease),
        border-color var(--dock-mediapl-btn-border-color-transition, 0.4s ease),
        border-radius var(--dock-mediapl-btn-border-radius-transition, 1.0s ease),
        box-shadow var(--dock-mediapl-btn-shadow-transition, 0.4s ease) !important;

      &:hover {
        transform: translateY(-0.5px);
        background-color: var(--dock-mediapl-btn-bg-color-on-dark-state, #ffffff4d) !important;
        /* --- */
        border-style:
          var(--dock-mediapl-btn-top-border-style-state, solid)
          var(--dock-mediapl-btn-right-border-style-state, solid)
          var(--dock-mediapl-btn-bottom-border-style-state, solid)
          var(--dock-mediapl-btn-left-border-style-state, solid) !important;
        border-color:
          var(--dock-mediapl-btn-top-border-color-on-dark-state, #00000000)
          var(--dock-mediapl-btn-right-border-color-on-dark-state, #00000000)
          var(--dock-mediapl-btn-bottom-border-color-on-dark-state, #00000000)
          var(--dock-mediapl-btn-left-border-color-on-dark-state, #00000000) !important;
        border-radius:
          var(--dock-mediapl-btn-top-left-border-radius-state, 10px)
          var(--dock-mediapl-btn-top-right-border-radius-state, 10px)
          var(--dock-mediapl-btn-bottom-right-border-radius-state, 10px)
          var(--dock-mediapl-btn-bottom-left-border-radius-state, 10px) !important;
        box-shadow:
          var(--dock-mediapl-btn-shadow-x-state, 0px)
          var(--dock-mediapl-btn-shadow-y-state, 0px)
          var(--dock-mediapl-btn-shadow-blur-state, 0px)
          var(--dock-mediapl-btn-shadow-spread-state, 0px)
          var(--dock-mediapl-btn-shadow-color-on-dark-state, #00000000) !important;
      }
    }

    .media-session:has(.media-session-title[style*="color: rgb(34, 34, 34)"]) .media-session-actions button {
      background-color: var(--dock-mediapl-btn-bg-color-on-light, #00000000) !important;
      border-color:
        var(--dock-mediapl-btn-top-border-color-on-light, #00000000)
        var(--dock-mediapl-btn-right-border-color-on-light, #00000000)
        var(--dock-mediapl-btn-bottom-border-color-on-light, #00000000)
        var(--dock-mediapl-btn-left-border-color-on-light, #00000000) !important;
      box-shadow:
        var(--dock-mediapl-btn-shadow-x, 0px)
        var(--dock-mediapl-btn-shadow-y, 0px)
        var(--dock-mediapl-btn-shadow-blur, 0px)
        var(--dock-mediapl-btn-shadow-spread, 0px)
        var(--dock-mediapl-btn-shadow-color-on-light, #00000000) !important;

      &:hover {
        background-color: var(--dock-mediapl-btn-bg-color-on-light-state, #0000004d) !important;
        border-color:
          var(--dock-mediapl-btn-top-border-color-on-light-state, #00000000)
          var(--dock-mediapl-btn-right-border-color-on-light-state, #00000000)
          var(--dock-mediapl-btn-bottom-border-color-on-light-state, #00000000)
          var(--dock-mediapl-btn-left-border-color-on-light-state, #00000000) !important;
        box-shadow:
          var(--dock-mediapl-btn-shadow-x-state, 0px)
          var(--dock-mediapl-btn-shadow-y-state, 0px)
          var(--dock-mediapl-btn-shadow-blur-state, 0px)
          var(--dock-mediapl-btn-shadow-spread-state, 0px)
          var(--dock-mediapl-btn-shadow-color-on-light-state, #00000000) !important;
      }
    }

    .media-session .media-session-actions button i svg {
      width: var(--dock-mediapl-btn-width, 14px) !important;
      height: var(--dock-mediapl-btn-height, 14px) !important;
      transform: translateY(-1px);
      /* --- */
      transition:
        color var(--dock-mediapl-btn-color-transition, 0.4s ease);
    }

    .media-session-actions button i[style*="color: rgb(34, 34, 34)"] {
      color: var(--dock-mediapl-btn-color-dark, #0e0e0e) !important;

      &:hover {
        color: var(--dock-mediapl-btn-color-dark-state, #101010) !important;
      }
    }

    .media-session-actions button i[style*="color: rgb(239, 239, 239)"] {
      color: var(--dock-mediapl-btn-color-light, #cccccc) !important;

      &:hover {
        color: var(--dock-mediapl-btn-color-light-state, #dbd9d9) !important;
      }
    }

    /* -----------------------------------------
    ! Player Title
    ----------------------------------------- */

    .media-session-title {
      display: inline-block !important;
      overflow: var(--dock-mediapl-title-overflow, hidden) !important;
      text-shadow:
        var(--dock-mediapl-marquee-dist, 75ch) 0 currentColor, calc(var(--dock-mediapl-marquee-dist, 75ch) * 2) 0 currentColor;
      will-change: transform;
      animation: var(--dock-mediapl-marquee-toggle, none);
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(calc(-1 * var(--dock-mediapl-marquee-dist, 75ch))); }
    }

    .media-session-title {
      font-family: var(--dock-mediapl-title-font, inherit) !important;
      font-size: var(--dock-mediapl-title-font-size, 11px) !important;
      font-weight: var(--dock-mediapl-title-font-weight, 600) !important;
      font-style: var(--dock-mediapl-title-style, normal) !important;
      letter-spacing: calc(var(--dock-mediapl-title-letter-spacing, 0) * 1px) !important;
      text-transform: var(--dock-mediapl-title-text-transform, none) !important;
      /* --- */
      transition:
        color var(--dock-mediapl-title-color-transition, 0.4s ease);

      &:hover {
        font-style: var(--dock-mediapl-title-style-state, normal);
        -webkit-text-stroke: calc(var(--dock-mediapl-style-wbtxt-state, 0) * 1px) currentColor;
      }
    }

    .media-session-title[style*="color: rgb(34, 34, 34)"] {
      color: var(--dock-mediapl-title-color-dark, #0e0e0e) !important;

      &:hover {
        color: var(--dock-mediapl-title-color-dark-state, #101010) !important;
      }
    }

    .media-session-title[style*="color: rgb(239, 239, 239)"] {
      color: var(--dock-mediapl-title-color-light, #cccccc) !important;

      &:hover {
        color: var(--dock-mediapl-title-color-light-state, #dbd9d9) !important;
      }
    }

    /* ensures no titles show on vertical orientation (as is default) */ 
    .weg-item.media-session-container-vertical .media-session-title {
      display: none !important;
    }

    /* -----------------------------------------
    ! Player Auto Hide
    ----------------------------------------- */
    .weg-item-drag-container:has(.media-session-title-default) {
      display: var(--dock-mediapl-no-media-hide, block) !important;
    }

    .horizontal:has(.media-session-title-default),
    .vertical:has(.media-session-title-default) {
      .weg-separator-1 {
        display: var(--dock-medpl-hide-sep-left-top, block) !important;
      }
      .weg-separator-2 {
        display: var(--dock-medpl-hide-sep-right-bot, block) !important;
      }
    }

    .horizontal:has(.media-session-title-default) {
      .weg-items-container {
        padding-right: var(--dock-medpl-right-bot-emptspc, var(--config-padding)) !important;
        padding-left: var(--dock-medpl-left-top-emptspc, var(--config-padding)) !important;
      }
    }

    .vertical:has(.media-session-title-default) {
      .weg-items-container {
        padding-top: var(--dock-medpl-left-top-emptspc, var(--config-padding)) !important;
        padding-bottom: var(--dock-medpl-right-bot-emptspc, var(--config-padding)) !important;
      }
    }