          var(--dock-module-title-shadow-color-state, #00000000);
        }
      }


    /* -----------------------------------------
    ! Group Seperators
    ----------------------------------------- */
    /* Done this way for auto-centering */
    .weg-separator {
      position: relative;
      z-index: 1;

      .horizontal & {
        display: flex !important;
        align-items: center !important;
        border: none !important;
        height: var(--config-item-size) !important;
        margin-top: 0 !important;

        &.weg-separator-1::after {
          content: '';
          display: block;
          /* --- */
          width: var(--dock-group-one-seperator-thickness, 3px);
          height: calc(var(--config-item-size) + var(--dock-group-one-seperator-height, 0) * 1px);
          background-color: var(--dock-group-one-seperator-color, #3a3a3b);
          border-radius: var(--dock-group-one-seperator-rounding, 6px);
          transform-origin: center;
