          var(--dock-app-open-sign-unfocused-right-bdr-style, solid)
          var(--dock-app-open-sign-unfocused-bottom-bdr-style, solid)
          var(--dock-app-open-sign-unfocused-left-bdr-style, solid);
        border-color:
          var(--dock-app-open-sign-unfocused-top-bdr-color, #00000000)
