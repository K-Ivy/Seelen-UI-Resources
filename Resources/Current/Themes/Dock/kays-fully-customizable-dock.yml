        text-shadow var(--dock-module-title-shadow-transition, 0.4s ease),
        transform var(--dock-module-title-transform-transition, 0.2s ease);

      &:hover {
        /* -9 = italic | 10 = normal | 0 = no change */
        transform: skewX(calc(var(--dock-module-title-style-ctrans-state, 0) * 1deg));
