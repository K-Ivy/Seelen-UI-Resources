          var(--dock-app-open-sign-shadow-spread, 0px)
          var(--dock-app-open-sign-shadow-color, #00000000);
        /* --- */
        transition:
          width var(--dock-app-open-sign-scale-transition, 0.4s ease),
          height var(--dock-app-open-sign-scale-transition, 0.4s ease),
          transform var(--dock-app-open-sign-scale-transition, 0.4s ease),
          opacity 0.4s ease,
          background-color var(--dock-app-open-sign-color-transition, 0.4s ease),
          border-color var(--dock-app-open-sign-bdr-color-transition, 0.4s ease),
          border-radius var(--dock-app-open-sign-rounding-transition, 0.4s ease),
          box-shadow var(--dock-app-open-sign-shadow-transition, 0.4s ease);

        .vertical & {
          transform: translateX(var(--dock-app-open-sign-dist-from-mod, 2px));
        }

        .horizontal & {
          transform: translateY(calc(var(--dock-app-open-sign-dist-from-mod, 2px) * -1));
        }

        &.weg-item-open-sign-focused {
          background-color: var(--dock-app-open-sign-focused-color, #4090c9);
          /* --- */
          border-width: var(--dock-app-open-sign-focused-bdr-thickness, 0px);
          border-style:
