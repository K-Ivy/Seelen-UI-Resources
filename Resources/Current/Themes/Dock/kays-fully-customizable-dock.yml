            var(--dock-app-open-sign-focused-bottom-bdr-style, solid)
            var(--dock-app-open-sign-focused-left-bdr-style, solid);
          border-color:
            var(--dock-app-open-sign-focused-top-bdr-color, #00000000)
            var(--dock-app-open-sign-focused-right-bdr-color, #00000000)
            var(--dock-app-open-sign-focused-bottom-bdr-color, #00000000)
            var(--dock-app-open-sign-focused-left-bdr-color, #00000000);
          border-radius:
            var(--dock-app-open-sign-focused-top-left-bdr-radius, 6px)
            var(--dock-app-open-sign-focused-top-right-bdr-radius, 6px)
            var(--dock-app-open-sign-focused-bottom-right-bdr-radius, 6px)
            var(--dock-app-open-sign-focused-bottom-left-bdr-radius, 6px);
          /* --- */
          box-shadow:
            var(--dock-app-open-sign-shadow-x-state, 0px)
            var(--dock-app-open-sign-shadow-y-state, 0px)
            var(--dock-app-open-sign-shadow-blur-state, 0px)
            var(--dock-app-open-sign-shadow-spread-state, 0px)
            var(--dock-app-open-sign-shadow-color-state, #00000000);

          .vertical & {
            height: var(--dock-app-open-sign-focused-hori-size, 16px);
            width: var(--dock-app-open-sign-focused-vert-size, 3px);
          }

          .horizontal & {
            width: var(--dock-app-open-sign-focused-hori-size, 16px);
            height: var(--dock-app-open-sign-focused-vert-size, 3px);
          }
        }
      }
