styles:
  '@seelen/weg': |
    /* -----------------------------------------
    ! Dock Base Layer
    ----------------------------------------- */
    .taskbar {
      > .bg-layers {
        > .bg-layer-1 {
          &::before,
          &::after {
            content: "";
            position: absolute;
            inset: 0;
            background-size: cover;
            background-repeat: no-repeat;
            /* --- */
            border-radius:
              var(--dock-base-top-left-border-radius, 13px)
