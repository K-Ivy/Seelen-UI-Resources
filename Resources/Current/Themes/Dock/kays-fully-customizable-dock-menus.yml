styles:
  '@seelen/weg': |
    /* -----------------------------------------
    ! App Title Popup
    ----------------------------------------- */
    .weg-item-preview-container:not(:has(.weg-item-preview-image-container)) {
      bottom: var(--dock-app-title-vert-pos, 0px);
      padding:
        var(--dock-app-title-padding-top, 3px)
        var(--dock-app-title-padding-right, 8px)
        var(--dock-app-title-padding-bottom, 3px)
        var(--dock-app-title-padding-left, 8px);

      > .bg-layers {
        > .bg-layer-1 {
          background-color: transparent !important;

          &::before,
          &::after {
            content: "";
            position: absolute;
            inset: 0;
            background-size: cover;
            background-repeat: no-repeat;
            /* --- */
            border-radius:
              var(--dock-app-title-top-left-bdr-radius, 13px)
              var(--dock-app-title-top-right-bdr-radius, 13px)
              var(--dock-app-title-bottom-right-bdr-radius, 13px)
              var(--dock-app-title-bottom-left-bdr-radius, 13px);
            /* --- */
            filter:
              brightness(var(--dock-app-title-filter-brightness, 1))
              contrast(var(--dock-app-title-filter-contrast, 1))
              grayscale(var(--dock-app-title-filter-grayscale, 0))
              hue-rotate(var(--dock-app-title-filter-hue-rotate, 0deg))
              invert(var(--dock-app-title-filter-invert, 0))
              opacity(var(--dock-app-title-filter-opacity, 1))
              saturate(var(--dock-app-title-filter-saturate, 1))
              sepia(var(--dock-app-title-filter-sepia, 0));
            /* --- */
            transition:
              border-radius var(--dock-app-title-bdr-radius-transition, 1.0s ease),
              opacity var(--dock-app-title-background-image-transition, 0.4s ease),
              filter var(--dock-app-title-filter-transition, 0.4s ease);
          }

          &::before {
            opacity: 1;
            background-position:
              var(--dock-app-title-image-pos-hori, 50%)
              var(--dock-app-title-image-pos-vert, 50%);
            background-image: var(--dock-app-title-bg-image, none);
          }

          &::after {
            opacity: 0;
            background-position:
              var(--dock-app-title-image-pos-hori-state, 50%)
              var(--dock-app-title-image-pos-vert-state, 50%);
            background-image: var(--dock-app-title-bg-image-state, none);
          }
        }

        > .bg-layer-2 {
          background-color: var(--dock-app-title-background-color, #222222CC);
          /* --- */
          border-width: var(--dock-app-title-bdr-thickness, 2px);
          border-style:
            var(--dock-app-title-top-bdr-style, solid)
            var(--dock-app-title-right-bdr-style, solid)
            var(--dock-app-title-bottom-bdr-style, solid)
            var(--dock-app-title-left-bdr-style, solid);
          border-color:
            var(--dock-app-title-top-bdr-color, #29292933)
            var(--dock-app-title-right-bdr-color, #29292933)
            var(--dock-app-title-bottom-bdr-color, #29292933)
            var(--dock-app-title-left-bdr-color, #29292933);
          border-radius:
            var(--dock-app-title-top-left-bdr-radius, 13px)
            var(--dock-app-title-top-right-bdr-radius, 13px)
            var(--dock-app-title-bottom-right-bdr-radius, 13px)
            var(--dock-app-title-bottom-left-bdr-radius, 13px);
          box-shadow:
            var(--dock-app-title-shadow-x, 0px)
            var(--dock-app-title-shadow-y, 0px)
            var(--dock-app-title-shadow-blur, 0px)
            var(--dock-app-title-shadow-spread, 0px)
            var(--dock-app-title-shadow-color, #00000000) !important;
          /* --- */
          transition:
            border-radius var(--dock-app-title-bdr-radius-transition, 1.0s ease),
            background-color var(--dock-app-title-background-color-transition, 0.4s ease),
            border-color var(--dock-app-title-bdr-color-transition, 0.4s ease),
            box-shadow var(--dock-app-title-shadow-transition, 0.4s ease);
        }
      }

      &:hover {
        > .bg-layers > .bg-layer-1 {
          &::before {
            opacity: 0;
          }

          &::after {
            opacity: 1;
            /* --- */
            border-radius:
              var(--dock-app-title-top-left-bdr-radius-state, 13px)
              var(--dock-app-title-top-right-bdr-radius-state, 13px)
              var(--dock-app-title-bottom-right-bdr-radius-state, 13px)
              var(--dock-app-title-bottom-left-bdr-radius-state, 13px);
            /* --- */
            filter:
              brightness(var(--dock-app-title-filter-brightness-state, 1))
              contrast(var(--dock-app-title-filter-contrast-state, 1))
              grayscale(var(--dock-app-title-filter-grayscale-state, 0))
              hue-rotate(var(--dock-app-title-filter-hue-rotate-state, 0deg))
              invert(var(--dock-app-title-filter-invert-state, 0))
              opacity(var(--dock-app-title-filter-opacity-state, 1))
              saturate(var(--dock-app-title-filter-saturate-state, 1))
              sepia(var(--dock-app-title-filter-sepia-state, 0));
          }
        }

        > .bg-layers > .bg-layer-2 {
          background-color: var(--dock-app-title-background-color-state, #222222CC);
          /* --- */
          border-style:
            var(--dock-app-title-top-bdr-style-state, solid)
            var(--dock-app-title-right-bdr-style-state, solid)
            var(--dock-app-title-bottom-bdr-style-state, solid)
            var(--dock-app-title-left-bdr-style-state, solid);
          border-color:
            var(--dock-app-title-top-bdr-color-state, #31323366)
            var(--dock-app-title-right-bdr-color-state, #31323366)
            var(--dock-app-title-bottom-bdr-color-state, #31323366)
            var(--dock-app-title-left-bdr-color-state, #31323366);
          border-radius:
            var(--dock-app-title-top-left-bdr-radius-state, 13px)
            var(--dock-app-title-top-right-bdr-radius-state, 13px)
            var(--dock-app-title-bottom-right-bdr-radius-state, 13px)
            var(--dock-app-title-bottom-left-bdr-radius-state, 13px);
          /* --- */
          box-shadow:
            var(--dock-app-title-shadow-x-state, 0px)
            var(--dock-app-title-shadow-y-state, 0px)
            var(--dock-app-title-shadow-blur-state, 0px)
            var(--dock-app-title-shadow-spread-state, 0px)
            var(--dock-app-title-shadow-color-state, #00000000) !important;
        }
      }
    }

    /* -----------------------------------------
    ! App Title Popup Text
    ----------------------------------------- */
    .weg-item-display-name {
      font-family: var(--dock-app-title-font, inherit);
      font-size: var(--dock-app-title-font-size, 12px) !important;
      font-weight: var(--dock-app-title-font-weight, 600) !important;
      font-style: var(--dock-app-title-style, normal);
      letter-spacing: calc(var(--dock-app-title-letter-spacing, 0) * 1px);
      text-transform: var(--dock-app-title-case, none);
      /* --- */
      color: var(--dock-app-title-color, #cccccc) !important;
      /* --- */
      text-shadow:
        var(--dock-app-title-text-shadow-x, 0px)
        var(--dock-app-title-text-shadow-y, 0px)
        var(--dock-app-title-text-shadow-blur, 0px)
        var(--dock-app-title-text-shadow-color, #00000000);
      /* --- */
      transition:
        color var(--dock-app-title-color-transition, 0.4s ease),
        text-shadow var(--dock-app-title-text-shadow-transition, 0.4s ease),
        transform var(--dock-app-title-text-transform-transition, 0s ease);

      &:hover {
        /* -9 = italic | 10 = normal | 0 = no change */
        transform: skewX(calc(var(--dock-app-title-style-ctrans-state, 0) * 1deg));
        -webkit-text-stroke: calc(var(--dock-app-title-style-wbtxt-state, 0) * 1px) currentColor;
        /* --- */
        color: var(--dock-app-title-color-state, #dbd9d9) !important;
        /* --- */
        text-shadow:
          var(--dock-app-title-text-shadow-x-state, 0px)
          var(--dock-app-title-text-shadow-y-state, 0px)
          var(--dock-app-title-text-shadow-blur-state, 0px)
          var(--dock-app-title-text-shadow-color-state, #00000000);
      }
    }


    /* -----------------------------------------
    ! Window Preview
    ----------------------------------------- */
    .weg-item-preview-container:has(.weg-item-preview-image-container) {
      bottom: var(--dock-window-prev-vertical-pos, 0px);

      > .bg-layers {
        > .bg-layer-1 {
          background-color: transparent !important;

          &::before,
          &::after {
            content: "";
            position: absolute;
            inset: 0;
            background-size: cover;
            background-repeat: no-repeat;
            border-radius:
              var(--dock-window-prev-top-left-bdr-radius, 13px)
